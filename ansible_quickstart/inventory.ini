[my_containers]
# ansible_ssh_private_key_file is used to specify the private key file for SSH authentication.Else it will udefault to root 
target_container ansible_host=172.17.80.1 ansible_port=2222 ansible_user=ansibleuser ansible_python_interpreter=/usr/bin/python3.9 ansible_ssh_private_key_file=/home/ansibleuser/.ssh/id_ed25519